info:
  name: Top up wallet
  type: http
  seq: 2
  tags:
    - Wallet

http:
  method: PATCH
  url: "{{baseUrl}}/wallet/"
  body:
    type: json
    data: |-
      {
        "amount": 5000
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Wallet topped up successfully
    request:
      url: "{{baseUrl}}/wallet/"
      method: PATCH
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "amount": 5000
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "client_secret": "pi_test123_secret_abc",
            "amount": 5000,
            "currency": "usd"
          }
  - name: 400 Response
    description: Bad request - invalid amount
    request:
      url: "{{baseUrl}}/wallet/"
      method: PATCH
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "amount": -100
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "invalid input",
            "message": "Amount must be a positive integer",
            "status_code": 400
          }
  - name: 401 Response
    description: Unauthorized - missing or invalid token
    request:
      url: "{{baseUrl}}/wallet/"
      method: PATCH
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "message": "Missing or invalid authorization token",
            "status_code": 401
          }
