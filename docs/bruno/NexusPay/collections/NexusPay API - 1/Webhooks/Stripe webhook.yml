info:
  name: Stripe webhook
  type: http
  seq: 1
  tags:
    - Webhooks

http:
  method: POST
  url: "{{baseUrl}}/webhook/stripe"
  body:
    type: json
    data: |-
      {
        "id": "evt_test_webhook",
        "type": "payment_intent.succeeded",
        "data": {
          "object": {
            "id": "pi_test123",
            "amount": 5000,
            "currency": "usd",
            "status": "succeeded"
          }
        }
      }
  headers:
    - name: Stripe-Signature
      value: "whsec_test_signature"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Webhook handled successfully
    request:
      url: "{{baseUrl}}/webhook/stripe"
      method: POST
      headers:
        - name: Stripe-Signature
          value: "whsec_test_signature"
      body:
        type: json
        data: |-
          {
            "id": "evt_test_webhook",
            "type": "payment_intent.succeeded",
            "data": {
              "object": {
                "id": "pi_test123",
                "amount": 5000,
                "currency": "usd",
                "status": "succeeded"
              }
            }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "received": true
          }
  - name: 400 Response
    description: Invalid Stripe signature
    request:
      url: "{{baseUrl}}/webhook/stripe"
      method: POST
      headers:
        - name: Stripe-Signature
          value: "invalid_signature"
      body:
        type: json
        data: |-
          {
            "id": "evt_test_webhook",
            "type": "payment_intent.succeeded",
            "data": {
              "object": {
                "id": "pi_test123",
                "amount": 5000,
                "currency": "usd",
                "status": "succeeded"
              }
            }
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "invalid signature",
            "message": "Webhook signature verification failed",
            "status_code": 400
          }
