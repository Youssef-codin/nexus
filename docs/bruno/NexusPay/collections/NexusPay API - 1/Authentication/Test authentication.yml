info:
  name: Test authentication
  type: http
  seq: 4
  tags:
    - Authentication

http:
  method: GET
  url: "{{baseUrl}}/auth/test"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Authentication successful, returns token claims
    request:
      url: "{{baseUrl}}/auth/test"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "123e4567-e89b-12d3-a456-426614174000",
            "exp": 1705317600,
            "iat": 1704712800
          }
  - name: 401 Response
    description: Unauthorized - missing or invalid token
    request:
      url: "{{baseUrl}}/auth/test"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "message": "Missing or invalid authorization token",
            "status_code": 401
          }
