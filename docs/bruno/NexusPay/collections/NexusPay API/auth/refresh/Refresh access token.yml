info:
  name: Refresh access token
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Token refreshed successfully
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh_token": "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "jwt_token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
            "refresh_token": "bmV3IHJlZnJlc2ggdG9rZW4..."
          }
  - name: 404 Response
    description: Not found - invalid or expired refresh token
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh_token": "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "User not found",
            "message": "Invalid or expired refresh token",
            "status_code": 404
          }
