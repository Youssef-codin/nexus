info:
  name: Login user
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "john.doe@example.com",
        "password": "SecurePassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Login successful
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "full_name": "John Doe",
            "jwt_token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
            "refresh_token": "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
          }
  - name: 401 Response
    description: Unauthorized - invalid credentials
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "invalid credentials",
            "message": "The provided credentials are incorrect",
            "status_code": 401
          }
  - name: 404 Response
    description: Not found - user not found
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!"
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "user not found",
            "message": "No user found with this email",
            "status_code": 404
          }
