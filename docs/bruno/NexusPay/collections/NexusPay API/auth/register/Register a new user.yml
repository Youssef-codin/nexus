info:
  name: Register a new user
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "john.doe@example.com",
        "password": "SecurePassword123!",
        "full_name": "John Doe"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: User successfully registered
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!",
            "full_name": "John Doe"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "full_name": "John Doe",
            "jwt_token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
            "refresh_token": "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
          }
  - name: 400 Response
    description: Bad request - invalid input
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!",
            "full_name": "John Doe"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Invalid input",
            "message": "Email is required and must be valid",
            "status_code": 400
          }
  - name: 409 Response
    description: Conflict - user already exists
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "john.doe@example.com",
            "password": "SecurePassword123!",
            "full_name": "John Doe"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "User already exists",
            "message": "A user with this email already exists",
            "status_code": 409
          }
